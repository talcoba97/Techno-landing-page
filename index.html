<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulse Night</title>
    <link href="https://fonts.googleapis.com/css2?family=Michroma&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
        <div class="header">
            <div class="logo">
                <a href="#">
                    <img src="assets/images/logo white.png" alt="Pulse Night Logo" class="logo-white" />
                    <img src="assets/images/logo dark.png" alt="Pulse Night Logo" class="logo-dark" />
                </a>
            </div>
            <ul class="nav-links" id="nav-links">
                <li><a href="#">Home</a></li>
                <li><a href="#">Events</a></li>
                <li><a href="#">Artists</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
            <div class="nav-menu-btn" id="menu-btn">
                <i class="ri-menu-line"></i>
            </div>
        </div>
    </nav>

    <header>
        <div class="header-image">
            <img src="assets/images/header.png" alt="header" />
        </div>
        <div class="header-content">
            <h1>Pulse Night</h1>
            <p>Experience the beat like never before</p>
            <div class="header-btn">
                <button>Join now</button>
            </div>
            <ul class="header-social">
                <li><a href="#"><i class="ri-whatsapp-fill"></i></a></li>
                <li><a href="#"><i class="ri-instagram-fill"></i></a></li>
                <li><a href="#"><i class="ri-twitter-fill"></i></a></li>
            </ul>
        </div>
    </header>
    <script src="js/script.js"></script>
</body>
</html>
